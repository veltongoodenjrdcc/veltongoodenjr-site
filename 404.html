<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found | Velton Gooden Jr</title>
  <meta name="robots" content="noindex">
  <base href="/">
  <link rel="icon" type="image/svg+xml" href="/assets/images/brand/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/site.css">
  <style>
    .error-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: var(--sp-8) var(--sp-6); background: var(--c-brand-grad); color: #fff; }
    .error-icon { font-size: clamp(3rem, 8vw, 5rem); margin-bottom: var(--sp-6); opacity: 0.9; }
    .error-code { font-size: clamp(5rem, 16vw, 9rem); font-weight: 800; line-height: 1; letter-spacing: -0.03em; margin-bottom: var(--sp-4); opacity: 0.9; }
    .error-title { font-size: clamp(1.25rem, 3vw, 1.75rem); font-weight: 600; margin-bottom: var(--sp-4); }
    .error-desc { font-size: var(--fs-lg); color: rgba(255,255,255,0.8); max-width: 44ch; line-height: 1.6; margin-bottom: var(--sp-8); }
    .error-actions { display: flex; flex-wrap: wrap; gap: var(--sp-3); justify-content: center; }
  </style>
</head>
<body>
  <div class="error-page" role="main">
    <div class="error-icon" aria-hidden="true"><i class="fa-solid fa-compass"></i></div>
    <p class="error-code" aria-label="Error 404">404</p>
    <h1 class="error-title">That page took a wrong turn.</h1>
    <p class="error-desc">It may have been moved, renamed, or it never existed. Let us get you back somewhere useful.</p>
    <div class="error-actions">
      <a href="/" class="btn btn--white btn--lg"><i class="fa-solid fa-house" aria-hidden="true"></i> Go to homepage</a>
      <a href="/lead-flow-fix/" class="btn btn--ghost btn--lg"><i class="fa-solid fa-filter" aria-hidden="true"></i> Lead Flow Fix</a>
      <a href="/contact/" class="btn btn--ghost btn--lg"><i class="fa-regular fa-envelope" aria-hidden="true"></i> Get in touch</a>
    </div>
  </div>
</body>
</html>
